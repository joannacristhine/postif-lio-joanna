<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>

    <style>
        body{
            background-color: rgb(40, 62, 131);
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        h1{
            text-align: center;
            color: bisque;
        }

        p{
            font-size: 20px;
        }

        div{
            background-color: rgb(220, 232, 245);
            padding: 15px;
            margin: 10px;
            border-bottom: 15px solid rgb(30, 34, 95);
            border-radius: 20px;
            transition: 0.5s;
        }

        div:hover{
            background-color: rgb(130, 199, 255);
            box-shadow: 0 10px 15px #0a0041;
        }
    </style>
</head>

<body>
    <h1>Bem-vindo ao meu site</h1>
    <div>
        <h2>Sobre mim</h2>
        <p>Sou estudante de tecnologia.</p>
    </div>
    <div>
        <h2>Hobbies</h2>
        <p>Gosto de programação, ler e jogar</p>
    </div>
    <div>
        <h2>Habilidades</h2>
        <p>Edição, programar e comunicação</p>
    </div>
</body>

</html>
